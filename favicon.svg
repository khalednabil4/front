<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="url(#bgGradient)"/>
  
  <!-- Water drop shape (main icon) -->
  <path d="M 32 4 C 32 4, 16 26, 16 38 C 16 50.15, 23.73 60, 32 60 C 40.27 60, 48 50.15, 48 38 C 48 26, 32 4, 32 4 Z" fill="url(#waterGradient)" stroke="#0369a1" stroke-width="1"/>
  
  <!-- Water ripple inside the drop -->
  <circle cx="32" cy="36" r="9" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="32" cy="36" r="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  
  <!-- Highlight on drop -->
  <ellipse cx="28" cy="18" rx="6" ry="9" fill="#ffffff" opacity="0.5"/>
</svg>
